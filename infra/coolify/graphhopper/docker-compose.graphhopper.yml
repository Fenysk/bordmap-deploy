# Bordmap R2 — GraphHopper routing engine as a SEPARATE Coolify resource (FEN-507).
#
# ADR D-R2: GraphHopper runs as its OWN container, NOT bundled into the app image
# — different runtime (JVM), a multi-GB memory profile, and a heavy one-time graph
# import that must not share the app's lifecycle or limits. Deploy this as a
# DISTINCT Coolify "Docker Compose" resource in the Bordmap project (build pack =
# dockercompose, base directory = repo root, compose location =
# /infra/coolify/graphhopper/docker-compose.graphhopper.yml).
#
# NETWORK: this service is NEVER assigned a public domain — it is reachable ONLY
# on the internal Coolify network. To let the Bordmap app's convex-backend
# (which runs the computeRoutes action, ADR D-R3) reach it by name, enable
# Coolify's "Connect To Predefined Network" toggle on BOTH this resource AND the
# Bordmap app resource. Both then share the `coolify` bridge network and resolve
# each other by container_name. The Convex action then uses:
#     GRAPHHOPPER_URL = http://bordmap-graphhopper:8989
services:
  graphhopper:
    container_name: bordmap-graphhopper
    build:
      # Context = THIS directory (compose-file-relative). config.yml +
      # import-and-serve.sh live here, so the Dockerfile COPYs them by local name.
      # A `../../..` repo-root context made COPY paths escape the resolved build
      # context and the Coolify dockercompose build pack rejected it right after
      # the JAR step (FEN-507) — keep the context tight to this dir.
      context: .
      dockerfile: Dockerfile
    environment:
      # Heap stays small because the graph is MMAP'd from disk (config.yml). Leaves
      # headroom under the cgroup limit for mmap page cache + GC.
      # import-and-serve.sh reads JAVA_OPTS.
      # 1g max / 256m initial: MMAP is off-heap so the JVM only needs heap for the
      # routing algorithm's working set (priority queues, A*). 2g was too large —
      # JVM+overhead consumed ~2.5g, leaving only ~1.5g for kernel MMAP page cache
      # on a 4g container → OOM after 15-45 min (FEN-519). Lower to 1g so the
      # kernel has ~2.5g for MMAP. For the one-time first import set
      # GH_JAVA_OPTS=-Xmx2g in the Coolify env and restore after (see README).
      JAVA_OPTS: ${GH_JAVA_OPTS:--Xmx1g -Xms256m}
      # Override the OSM source/region here without rebuilding the image if needed.
      GH_OSM_URL: ${GH_OSM_URL:-https://download.geofabrik.de/europe/france-latest.osm.pbf}
    volumes:
      # Persistent: OSM extract (~4.5 GB) + built graph cache (~3-5 GB) + SRTM
      # cache (~1-2 GB). Host must provide >= 20 GB free on this volume's disk
      # (ADR §Infra). Named volume → survives redeploys, so the heavy import runs
      # ONCE and restarts serve from cache.
      - graphhopper-data:/data
    # RUNTIME memory cap. JVM heap = 1g + ~0.5g JVM overhead + MMAP page cache for
    # the France graph (up to ~3-4g of kernel pages). 5g gives the kernel enough
    # room to hold hot graph segments without OOM-killing the JVM (FEN-519: the old
    # 4g limit was too tight — heap+overhead left only ~1.5g for MMAP). If the NAS
    # cannot spare 5g, lower to 4g AND set GH_JAVA_OPTS=-Xmx768m in Coolify env.
    mem_limit: 5g
    healthcheck:
      # AC-as-healthcheck (FEN-507 completeness criterion). This service is
      # internal-only (no public domain) and this Coolify version (4.1.2) exposes
      # no command-exec API and a broken per-app logs endpoint — so the ONLY
      # reliable signal we can read back is the container's health STATUS. We make
      # that status MEAN the AC: the healthcheck runs the actual completeness
      # query — a bordmap_road route between two French points with elevation — and
      # asserts the response carries `ascend` (proves the route computes for the
      # profile AND elevation is baked into the graph). `running:healthy` therefore
      # certifies the AC end-to-end. It is also a strictly better production
      # readiness probe than a bare /health ping. Elevation is baked at import time,
      # so this query is deterministic with no runtime network dependency.
      # During the one-time France import the server is not yet bound, so
      # start_period stays generous. curl + grep are in the image.
      test:
        - CMD-SHELL
        - 'curl -fsS "http://127.0.0.1:8989/route?point=45.188,5.724&point=45.196,5.735&profile=bordmap_road&elevation=true&points_encoded=false&instructions=false" | grep -q ascend'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5400s
    restart: unless-stopped
    networks:
      - coolify

volumes:
  graphhopper-data:

# `coolify` is Coolify's predefined shared bridge network. Marked external so this
# compose joins it rather than creating an isolated one — that is what makes
# bordmap-graphhopper resolvable from the app/convex-backend containers. Requires
# the "Connect To Predefined Network" toggle ON for this resource in Coolify.
networks:
  coolify:
    external: true
